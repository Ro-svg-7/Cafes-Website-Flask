{% extends "base.html" %}

{% block content %}

<style>
  .auth-page {
    min-height: 85vh;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  .auth-container {
    width: 100%;
    max-width: 440px;
  }

  .auth-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .auth-header .icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
  }

  .auth-header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.4rem;
  }

  .auth-header p {
    color: #666;
    font-size: 0.88rem;
  }

  .auth-card {
    background: #161616;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 2.2rem 2.5rem;
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  .form-label {
    display: block;
    font-size: 0.8rem;
    color: #aaa;
    margin-bottom: 0.4rem;
    font-weight: 500;
  }

  .form-control-dark {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #fff;
    padding: 0.75rem 1rem;
    font-size: 0.88rem;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-control-dark::placeholder { color: #444; }
  .form-control-dark:focus {
    border-color: #4caf7d;
    box-shadow: 0 0 0 3px rgba(76,175,125,0.1);
  }

  .btn-submit {
    width: 100%;
    background: #4caf7d;
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 0.85rem;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .btn-submit:hover { background: #5dca93; }
  .btn-submit:active { transform: scale(0.99); }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
  }
  .auth-divider::before,
  .auth-divider::after {
    content: '';
    flex: 1;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .auth-divider span {
    font-size: 0.75rem;
    color: #555;
  }

  .auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.83rem;
    color: #555;
  }
  .auth-footer a {
    color: #4caf7d;
    text-decoration: none;
    font-weight: 500;
  }
  .auth-footer a:hover { color: #6ddfa0; }

  .input-icon-wrap {
    position: relative;
  }
  .input-icon-wrap i {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: #444;
    font-size: 0.9rem;
    pointer-events: none;
  }
  .input-icon-wrap .form-control-dark {
    padding-left: 2.5rem;
  }

  .forgot-link {
    display: block;
    text-align: right;
    font-size: 0.75rem;
    color: #555;
    text-decoration: none;
    margin-top: 0.3rem;
    transition: color 0.2s;
  }
  .forgot-link:hover { color: #4caf7d; }
</style>

<main class="main auth-page">
  <div class="auth-container">

    <div class="auth-header">
      <div class="icon">☕</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your SpotBrew account.</p>
    </div>

    <div class="auth-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div styles="
            background: rgba(255,80,80,0.1);
            border: 1px solid rgba(255,80,80,0.3);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            color: #ff6060;
            font-size: 0.83rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        ">
        <i class="bi bi-exclamation-circle"></i>{{ message }}
        </div>
        {% endfor %}
    {% endwith %}
      <form action="{{ url_for('login') }}" method="POST">

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-icon-wrap">
            <i class="bi bi-envelope"></i>
            <input type="email" name="email" class="form-control-dark"
                   placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" name="password" class="form-control-dark"
                   placeholder="Your password" required>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>

      </form>

      <div class="auth-divider"><span>or</span></div>

      <div class="auth-footer">
        Don't have an account?
        <a href="{{ url_for('register') }}">Sign up</a>
      </div>
    </div>

  </div>
</main>

{% endblock %}
